<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jannati AI Tutor V0.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <section id="login" class="screen">
    <div class="hero">
      <div class="mascot">🤖</div>
      <h1>Jannati AI Tutor</h1>
      <p>Belajar Macam Bermain</p>
    </div>
    <div class="card">
      <label>Nama anak</label>
      <input id="nameInput" placeholder="Contoh: Aisyah">
      <button onclick="saveProfile()">Mula Belajar</button>
    </div>
  </section>

  <section id="dashboard" class="screen hidden">
    <div class="profile-card">
      <div class="avatar">👦</div>
      <div>
        <h2 id="greeting">Hai!</h2>
        <p>Jom dapatkan XP hari ini 🌟</p>
      </div>
      <button class="ghost" onclick="resetProfile()">Reset</button>
    </div>

    <div class="stats">
      <div class="stat"><b id="xp">0</b><span>XP</span></div>
      <div class="stat"><b id="level">1</b><span>Level</span></div>
      <div class="stat"><b id="coins">0</b><span>Coins 🪙</span></div>
      <div class="stat"><b id="streak">0</b><span>Streak 🔥</span></div>
    </div>

    <div class="card mission">
      <h3>🎯 Misi Hari Ini</h3>
      <p>Siapkan 1 topik BM untuk dapat ganjaran.</p>
      <div class="progress-wrap"><div id="missionBar" class="progress"></div></div>
      <p id="missionText">0% siap</p>
    </div>

    <div class="card">
      <h3>📚 Bahasa Melayu Tahun 2</h3>
      <p id="totalInfo"></p>
      <div id="topicList" class="topics"></div>
    </div>

    <div class="card">
      <h3>🏅 Lencana</h3>
      <div id="badges" class="badges"></div>
    </div>

    <div class="card">
      <h3>📊 Rekod Kemajuan</h3>
      <div id="progressList"></div>
    </div>
  </section>

  <section id="quiz" class="screen hidden">
    <div class="topbar">
      <button class="ghost" onclick="showDashboard()">← Dashboard</button>
      <div class="pill" id="quizCounter">1/5</div>
    </div>

    <div class="card tutor">
      <div class="small-mascot">🤖</div>
      <div>
        <h3 id="topicTitle"></h3>
        <p id="topicNote"></p>
      </div>
    </div>

    <div class="card questionCard">
      <div class="progress-wrap"><div id="quizBar" class="progress"></div></div>
      <div class="pill" id="questionNo">Soalan 1</div>
      <h2 id="questionText"></h2>
      <input id="answerInput" placeholder="Tulis jawapan di sini" autocomplete="off">
      <div class="row">
        <button class="secondary" onclick="showHint()">💡 Hint</button>
        <button onclick="checkAnswer()">Semak</button>
      </div>
    </div>

    <div id="feedback" class="feedback hidden"></div>
  </section>

  <section id="finish" class="screen hidden">
    <div class="card finish">
      <div class="big">🎉</div>
      <h2>Tahniah!</h2>
      <p id="finishText"></p>
      <p id="badgeText" class="badge"></p>
      <button onclick="showDashboard()">Kembali ke Dashboard</button>
    </div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
