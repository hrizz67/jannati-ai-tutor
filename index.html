<!DOCTYPE html><html lang="ms"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jannati AI Tutor - Full Latihan</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><section id="login" class="screen"><div class="hero"><div class="bot">🤖</div><h1>Jannati AI Tutor</h1><p>Belajar Macam Bermain</p></div><div class="card"><label>Nama anak</label><input id="nameInput" placeholder="Contoh: Aisyah"><label>Darjah</label><select id="yearInput"><option>Tahun 2</option><option>Tahun 1</option><option>Tahun 3</option></select><button onclick="saveProfile()">Mula Belajar</button></div></section><section id="dashboard" class="screen hidden"><div class="top"><div><h2 id="greeting">Hai!</h2><p>Jom belajar 10 minit hari ini.</p></div><button class="ghost" onclick="resetProfile()">Tukar Nama</button></div><div class="stats"><div class="stat"><b id="xp">0</b><span>XP</span></div><div class="stat"><b id="level">1</b><span>Level</span></div><div class="stat"><b id="streak">0</b><span>Streak 🔥</span></div></div><div class="card"><h3>📚 Bahasa Melayu Tahun 2</h3><p id="totalInfo"></p><div id="topicList" class="topics"></div></div><div class="card"><h3>📊 Rekod Kemajuan</h3><div id="progressList"></div></div></section><section id="quiz" class="screen hidden"><div class="top"><button class="ghost" onclick="showDashboard()">← Dashboard</button><div class="pill" id="quizCounter">1/20</div></div><div class="card tutor"><div class="bot smallbot">🤖</div><div><h3 id="topicTitle"></h3><p id="topicNote"></p></div></div><div class="card questionCard"><div class="pill" id="questionNo">Soalan 1</div><h2 id="questionText"></h2><input id="answerInput" placeholder="Tulis jawapan di sini" autocomplete="off"><div class="row"><button class="secondary" onclick="showHint()">💡 Hint</button><button onclick="checkAnswer()">Semak</button></div></div><div id="feedback" class="feedback hidden"></div></section><section id="finish" class="screen hidden"><div class="card finish"><div class="big">🎉</div><h2>Tahniah!</h2><p id="finishText"></p><p id="badgeText" class="badge"></p><button onclick="showDashboard()">Kembali ke Dashboard</button></div></section></div><script src="app.js"></script></body></html>
